<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatusBoard — painel de infraestrutura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="board">

    <header class="board__header">
      <div class="board__brand">
        <span class="board__dot"></span>
        <h1 class="board__title">STATUSBOARD</h1>
      </div>
      <div class="board__clock">
        <span id="clock">--:--:--</span>
        <span class="board__tz">local</span>
      </div>
    </header>

    <div class="board__subbar">
      <span>painel de infraestrutura</span>
      <span id="summary" class="board__summary">carregando serviços…</span>
    </div>

    <div class="board__cols" role="row">
      <span class="col col--service">serviço</span>
      <span class="col col--status">status</span>
      <span class="col col--latency">latência</span>
      <span class="col col--uptime">uptime 30d</span>
      <span class="col col--check">última checagem</span>
    </div>

    <div id="rows" class="board__rows">
      <!-- linhas geradas via JS -->
    </div>

    <footer class="board__footer">
      <span>atualiza a cada <span id="interval-label">10s</span></span>
      <span class="board__legend">
        <span class="legend legend--ok"></span> operacional
        <span class="legend legend--degraded"></span> degradado
        <span class="legend legend--down"></span> indisponível
      </span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
